<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тест связи</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <h1>Тест связи с ботом</h1>
    <button id="btn">Отправить данные</button>
    <p>Нажмите кнопку, затем проверьте консоль бота.</p>
    <script>
        const tg = Telegram.WebApp;
        tg.ready();
        document.getElementById('btn').onclick = () => {
            tg.sendData(JSON.stringify({ test: "hello", time: Date.now() }));
            alert("Отправлено!");
        };
    </script>
</body>
</html>
